<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Pairing performance surface</title>
<style>
  html, body { margin: 0; height: 100%; background: #0a0d18; color: #c9d2e8; overflow: hidden;
    font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #wrap { height: 100vh; display: flex; align-items: center; justify-content: center; }
  #stage { position: relative; height: 100vh; aspect-ratio: 1080 / 1446; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; cursor: grab; }
  canvas:active { cursor: grabbing; }
  #masthead { position: absolute; left: 7%; top: 5%; pointer-events: none; }
  #masthead .logo { font-weight: 800; font-size: 4.2vh; letter-spacing: .04em; color: #fff; }
  #masthead .bar { height: .9vh; width: 11vh; background: #d9a521; margin-top: .4vh; }
  #footer { position: absolute; left: 0; right: 0; bottom: 1.6%; text-align: center;
    color: #fff; font-weight: 600; font-size: 1.05vh; opacity: .85; pointer-events: none; }
  #ui { position: fixed; top: 20px; right: 22px; width: 230px; pointer-events: none; }
  #ctl { display: flex; flex-direction: column; gap: 9px; pointer-events: auto; }
  select, button { background: #1c2238; color: #dbe3f7; border: 1px solid #2c3450; border-radius: 6px;
    padding: 7px 9px; font-size: 12px; cursor: pointer; width: 100%; box-sizing: border-box; }
  button:hover { background: #252d49; }
  label { color: #aab3cc; display: flex; align-items: center; gap: 8px; font-size: 12px;
    text-shadow: 0 1px 6px #0a0d18; }
  #hint { position: fixed; bottom: 16px; right: 22px; color: #5d6685; font-size: 11.5px; }
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="c"></canvas>
    <div id="masthead"><div class="logo">PNAS</div><div class="bar"></div></div>
    <div id="footer">Proceedings of the National Academy of Sciences of the United States of America</div>
  </div>
</div>
<div id="ui">
  <div id="ctl">
    <select id="measure">
      <option value="comp">Composite (text + image + click)</option>
      <option value="t">Human-rated text quality</option>
      <option value="i">Human-rated image quality</option>
      <option value="c">Click-through</option>
    </select>
    <label><input type="checkbox" id="box" /> bounding box</label>
    <label><input type="checkbox" id="labels" /> trait labels</label>
    <button id="save">Download PNG (2×)</button>
  </div>
</div>
<div id="hint">drag to orbit &middot; scroll to zoom</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

// ---- Real coefficients: SI Table tab:ad_quality_itx -----------------------
// rows = human trait, cols = AI trait, both ordered O,C,E,A,N. Each cell holds
// text / image / click coefficients (ordinal logit on individual ratings).
const TRAITS = ['O','C','E','A','N'];
const DATA = {
  O: { O:{t:0.147,i:-0.206,c:-0.084}, C:{t:0.302,i:0.111,c:0.141}, E:{t:-0.040,i:-0.094,c:-0.105}, A:{t:-0.303,i:0.273,c:0.106}, N:{t:-0.022,i:0.062,c:0.087} },
  C: { O:{t:-0.108,i:0.427,c:0.043}, C:{t:0.506,i:0.057,c:0.109}, E:{t:-0.124,i:-0.013,c:0.014}, A:{t:-0.594,i:-0.342,c:-0.337}, N:{t:0.206,i:0.067,c:0.142} },
  E: { O:{t:0.195,i:0.271,c:0.266}, C:{t:-0.472,i:-0.518,c:-0.436}, E:{t:0.344,i:-0.097,c:0.139}, A:{t:0.112,i:-0.085,c:0.025}, N:{t:-0.241,i:0.114,c:-0.017} },
  A: { O:{t:-0.030,i:-0.285,c:-0.176}, C:{t:0.074,i:-0.097,c:-0.015}, E:{t:-0.367,i:-0.076,c:-0.216}, A:{t:-0.022,i:0.058,c:0.051}, N:{t:0.264,i:-0.109,c:-0.107} },
  N: { O:{t:0.037,i:0.066,c:-0.109}, C:{t:-0.143,i:-0.193,c:-0.262}, E:{t:0.157,i:0.086,c:0.181}, A:{t:0.015,i:-0.235,c:-0.084}, N:{t:-0.163,i:-0.138,c:-0.048} },
};
function gridFor(measure) {
  const G = [];
  for (let r = 0; r < 5; r++) { const row = [];
    for (let cc = 0; cc < 5; cc++) {
      const d = DATA[TRAITS[r]][TRAITS[cc]];
      row.push(measure === 'comp' ? (d.t + d.i + d.c) / 3 : d[measure]);
    } G.push(row);
  } return G;
}

// ---- Catmull-Rom bicubic interpolation over the 5x5 grid -------------------
function cr(p0, p1, p2, p3, t) {
  return 0.5 * ((2*p1) + (-p0+p2)*t + (2*p0-5*p1+4*p2-p3)*t*t + (-p0+3*p1-3*p2+p3)*t*t*t);
}
function at(G, i, j) { i = Math.max(0, Math.min(4, i)); j = Math.max(0, Math.min(4, j)); return G[i][j]; }
function sample(G, u, v) {            // u,v in [0,4]
  const iu = Math.floor(u), fu = u - iu, iv = Math.floor(v), fv = v - iv;
  const col = [];
  for (let m = -1; m <= 2; m++)
    col.push(cr(at(G,iu-1,iv+m), at(G,iu,iv+m), at(G,iu+1,iv+m), at(G,iu+2,iv+m), fu));
  return cr(col[0], col[1], col[2], col[3], fv);
}

// ---- exact rendering from the local cover (data_surface.html) --------------
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
renderer.setClearColor(new THREE.Color('#0a0d18'), 1);
const BASE_W = 1080, BASE_H = 1446, ASPECT = BASE_W / BASE_H;
function sizeRenderer(s = 1) { renderer.setPixelRatio(1); renderer.setSize(BASE_W * s, BASE_H * s, false); }
const DPR = Math.min(window.devicePixelRatio || 1, 4);
sizeRenderer(DPR);

const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(34, ASPECT, 0.1, 100);
const group = new THREE.Group();
scene.add(group);

const SPAN = 1.0, HSCALE = 0.95;

const NU = 520, NV = 520, NP = NU * NV;
const positions = new Float32Array(NP * 3);
const aVal = new Float32Array(NP);
const aJit = new Float32Array(NP);
const aNrm = new Float32Array(NP * 3);
let s = 12345; const rnd = () => { s = (s*9301 + 49297) % 233280; return s/233280; };
for (let i = 0; i < NP; i++) aJit[i] = 0.92 + rnd() * 0.16;

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geo.setAttribute('aVal', new THREE.BufferAttribute(aVal, 1));
geo.setAttribute('aJit', new THREE.BufferAttribute(aJit, 1));
geo.setAttribute('aNrm', new THREE.BufferAttribute(aNrm, 3));

function buildSurface(measure) {
  const G = gridFor(measure);
  let maxAbs = 0;
  for (let r = 0; r < 5; r++) for (let cc = 0; cc < 5; cc++) maxAbs = Math.max(maxAbs, Math.abs(G[r][cc]));
  let p = 0;
  for (let iu = 0; iu < NU; iu++) {
    const u = (iu / (NU - 1)) * 4;
    for (let iv = 0; iv < NV; iv++) {
      const v = (iv / (NV - 1)) * 4;
      const val = sample(G, u, v);
      const d = 0.02;
      const hL = sample(G, u - d, v) / maxAbs * HSCALE * 0.5;
      const hR = sample(G, u + d, v) / maxAbs * HSCALE * 0.5;
      const hD = sample(G, u, v - d) / maxAbs * HSCALE * 0.5;
      const hU = sample(G, u, v + d) / maxAbs * HSCALE * 0.5;
      const dx = d * SPAN * 0.5, dz = d * SPAN * 0.5;
      // tangents in world space
      const tx = [2 * dx, hR - hL, 0];
      const tv = [0, hU - hD, 2 * dz];
      // normal = cross(tx, tv)
      let nx = tx[1] * tv[2] - tx[2] * tv[1];
      let ny = tx[2] * tv[0] - tx[0] * tv[2];
      let nz = tx[0] * tv[1] - tx[1] * tv[0];
      const nl = Math.hypot(nx, ny, nz) || 1;
      if (ny < 0) { nx = -nx; ny = -ny; nz = -nz; }   // point up
      positions[p*3]   = (u / 4 - 0.5) * 2 * SPAN;
      positions[p*3+1] = (val / maxAbs) * HSCALE * 0.5;
      positions[p*3+2] = (v / 4 - 0.5) * 2 * SPAN;
      aVal[p] = val / maxAbs;
      aNrm[p*3] = nx / nl; aNrm[p*3+1] = ny / nl; aNrm[p*3+2] = nz / nl;
      p++;
    }
  }
  geo.attributes.position.needsUpdate = true;
  geo.attributes.aVal.needsUpdate = true;
  geo.attributes.aNrm.needsUpdate = true;
}

const uniforms = {
  uPix:     { value: renderer.getPixelRatio() },
  uMagenta: { value: new THREE.Color('#d6379b') },
  uCyan:    { value: new THREE.Color('#2bb6d9') },
  uGold:    { value: new THREE.Color('#f0c64a') },
  uLight:   { value: new THREE.Vector3(0.55, 0.78, 0.32).normalize() },
  uBg:      { value: new THREE.Color('#0a0d18') },
};
const mat = new THREE.ShaderMaterial({
  uniforms, transparent: true, depthTest: true, depthWrite: true, blending: THREE.NormalBlending,
  vertexShader: /* glsl */`
    uniform float uPix; attribute float aVal; attribute float aJit; attribute vec3 aNrm;
    uniform vec3 uLight;
    varying float vVal; varying float vRand; varying float vLight; varying float vFog;
    void main() {
      vVal = aVal; vRand = aJit;
      vec3 N = normalize(aNrm);
      float diff = max(dot(N, uLight), 0.0);
      vLight = 0.05 + 1.7 * pow(diff, 0.7);
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      float dist = -mv.z;
      vFog = smoothstep(3.0, 7.5, dist);
      gl_Position = projectionMatrix * mv;
      float mag = abs(aVal);
      gl_PointSize = (0.55 + 1.5 * mag) * uPix * aJit * (11.0 / dist);
    }
  `,
  fragmentShader: /* glsl */`
    precision highp float;
    varying float vVal; varying float vRand; varying float vLight; varying float vFog;
    uniform vec3 uMagenta; uniform vec3 uCyan; uniform vec3 uGold; uniform vec3 uBg;
    void main() {
      vec2 pc = gl_PointCoord - 0.5;
      float r = length(pc);
      float a = step(r, 0.5);
      if (a < 0.5) discard;
      float core = step(r, 0.32);
      float mag = abs(vVal);
      vec3 hue = vVal >= 0.0 ? uGold : uMagenta;
      vec3 col = mix(uCyan * 0.45, hue, clamp(mag * 1.6, 0.0, 1.0));
      col *= (0.6 + 1.15 * mag);
      col *= (0.97 + 0.06 * vRand);
      col *= vLight;
      col += vec3(1.0) * core * (0.40 + 0.6 * mag) * vLight;
      col *= 1.3;
      col = mix(col, uBg, vFog * 0.75);
      gl_FragColor = vec4(col, a);
    }
  `,
});
group.add(new THREE.Points(geo, mat));

// ---- bounding box + base grid + trait labels -------------------------------
const boxGroup = new THREE.Group(); boxGroup.visible = false; group.add(boxGroup);
const H = HSCALE * 0.5;
const boxMat = new THREE.LineBasicMaterial({ color: 0x37406a, transparent: true, opacity: 0.55 });
const gridMat = new THREE.LineBasicMaterial({ color: 0x2a3252, transparent: true, opacity: 0.4 });
{
  const pts = [];
  for (let k = 0; k <= 5; k++) {
    const t = (k / 5 - 0.5) * 2 * SPAN;
    pts.push(-SPAN, -H, t, SPAN, -H, t);
    pts.push(t, -H, -SPAN, t, -H, SPAN);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pts), 3));
  boxGroup.add(new THREE.LineSegments(g, gridMat));
}
{
  const e = [
    [-SPAN,-H,-SPAN, SPAN,-H,-SPAN],[SPAN,-H,-SPAN, SPAN,-H,SPAN],[SPAN,-H,SPAN,-SPAN,-H,SPAN],[-SPAN,-H,SPAN,-SPAN,-H,-SPAN],
    [-SPAN,H,-SPAN, SPAN,H,-SPAN],[SPAN,H,-SPAN, SPAN,H,SPAN],[SPAN,H,SPAN,-SPAN,H,SPAN],[-SPAN,H,SPAN,-SPAN,H,-SPAN],
    [-SPAN,-H,-SPAN,-SPAN,H,-SPAN],[SPAN,-H,-SPAN,SPAN,H,-SPAN],[SPAN,-H,SPAN,SPAN,H,SPAN],[-SPAN,-H,SPAN,-SPAN,H,SPAN],
  ].flat();
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(new Float32Array(e), 3));
  boxGroup.add(new THREE.LineSegments(g, boxMat));
}
function labelSprite(ch) {
  const cv = document.createElement('canvas'); cv.width = cv.height = 128;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#aeb8d8'; ctx.font = 'bold 84px Inter, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(ch, 64, 70);
  const tex = new THREE.CanvasTexture(cv); tex.anisotropy = 4;
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false }));
  sp.scale.set(0.16, 0.16, 0.16);
  return sp;
}
const labelGroup = new THREE.Group(); labelGroup.visible = false; group.add(labelGroup);
for (let k = 0; k < 5; k++) {
  const t = (k / 4 - 0.5) * 2 * SPAN;
  const a = labelSprite(TRAITS[k]); a.position.set(t, -H, SPAN + 0.16); labelGroup.add(a);
  const b = labelSprite(TRAITS[k]); b.position.set(SPAN + 0.16, -H, t); labelGroup.add(b);
}

// ---- camera orbit + zoom ---------------------------------------------------
let az = -0.7, el = 0.62, R = 4.2;
function placeCam() {
  cam.position.set(Math.cos(el) * Math.sin(az) * R, Math.sin(el) * R, Math.cos(el) * Math.cos(az) * R);
  cam.lookAt(0, -0.05, 0);
}
let drag = false, lx = 0, ly = 0;
canvas.addEventListener('pointerdown', (e) => { drag = true; lx = e.clientX; ly = e.clientY; });
window.addEventListener('pointerup', () => { drag = false; });
window.addEventListener('pointermove', (e) => {
  if (!drag) return;
  az -= (e.clientX - lx) * 0.006; lx = e.clientX;
  el = Math.max(0.06, Math.min(1.45, el + (e.clientY - ly) * 0.005)); ly = e.clientY;
});
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  R = Math.max(1.8, Math.min(9.0, R * (1 + e.deltaY * 0.0012)));
}, { passive: false });

buildSurface('comp');
function render() {
  uniforms.uPix.value = renderer.getPixelRatio();
  placeCam();
  renderer.render(scene, cam);
}
renderer.setAnimationLoop(render);

document.getElementById('measure').onchange = (e) => buildSurface(e.target.value);
document.getElementById('box').onchange = (e) => { boxGroup.visible = e.target.checked; };
document.getElementById('labels').onchange = (e) => { labelGroup.visible = e.target.checked; };
document.getElementById('save').onclick = () => {
  sizeRenderer(4); uniforms.uPix.value = 4 / DPR; renderer.render(scene, cam);
  const a = document.createElement('a'); a.href = renderer.domElement.toDataURL('image/png');
  a.download = 'pairing_surface.png'; a.click();
  sizeRenderer(Math.min(window.devicePixelRatio || 1, 4));
};
</script>
</body>
</html>
